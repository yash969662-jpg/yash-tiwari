<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Clock - Multiple Time Zones</title>
    <link rel="stylesheet" href="clock-style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1><i class="fas fa-clock"></i> World Clock</h1>
            <p>Current Time Across Time Zones</p>
        </div>

        <div class="controls">
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="Search or add time zone...">
                <button id="addBtn"><i class="fas fa-plus"></i> Add</button>
            </div>
            <div class="suggestions" id="suggestions"></div>
        </div>

        <div class="clocks-grid" id="clocksGrid">
            <!-- Clock cards will be inserted here -->
        </div>

        <div class="reset-btn">
            <button id="resetBtn"><i class="fas fa-redo"></i> Reset to Default</button>
        </div>
    </div>

    <script src="clock-script.js"></script>
</body>
</html>
